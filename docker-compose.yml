services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pipeline_orchestrator
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    build: .
    command: ["node", "dist/db/migrate.js"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pipeline_orchestrator
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    command: ["node", "dist/api/index.js"]
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pipeline_orchestrator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 5
      DELIVERY_MAX_RETRIES: 3
      DELIVERY_BACKOFF_MS: 1000
      MAX_PAYLOAD_BYTES: 1048576
      STALLED_JOB_TIMEOUT_MS: 300000
      DELIVERY_TIMEOUT_MS: 10000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["node", "dist/worker/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pipeline_orchestrator
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 5
      DELIVERY_MAX_RETRIES: 3
      DELIVERY_BACKOFF_MS: 1000
      MAX_PAYLOAD_BYTES: 1048576
      STALLED_JOB_TIMEOUT_MS: 300000
      DELIVERY_TIMEOUT_MS: 10000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  postgres_data:
